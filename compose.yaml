services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: agents_workshop
      POSTGRES_HOST_AUTH_METHOD: trust
      POSTGRES_USER: devchandra
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devchandra -d agents_workshop"]
      interval: 5s
      timeout: 5s
      retries: 12

  valkey:
    image: valkey/valkey:8-alpine
    command: ["valkey-server", "--save", "", "--appendonly", "no"]
    ports:
      - "${VALKEY_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  postgres-data:
