# naive-agent. One web service + Postgres.
# Deploy from the repo root (rootDir: ../..) so the npm workspaces resolve.

databases:
  - name: naive-agent-db
    plan: basic-256mb
    region: oregon
    postgresMajorVersion: "17"

services:
  - type: web
    name: naive-agent
    runtime: node
    region: oregon
    plan: starter
    rootDir: ../..
    buildCommand: npm install
    startCommand: npm run start --workspace @workshop/naive-agent
    healthCheckPath: /healthz
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: naive-agent-db
          property: connectionString
      # Optional — without a key the agent uses a mock model.
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: NODE_ENV
        value: production
