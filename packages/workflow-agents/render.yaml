# yaml-language-server: $schema=https://render.com/schema/render.yaml.json
#
# workflow-agents. Web host (Hono) + managed Postgres.
# Deploy from the repo root (rootDir: ../..) so the npm workspaces resolve.
#
# The Workflow *worker* (which runs the registered tasks) is created separately
# in the Render Dashboard as a Workflow — see docs/03-workflow-agents.md.

databases:
  - name: workflow-agents-db
    plan: basic-256mb
    region: oregon
    postgresMajorVersion: "17"

services:
  - type: web
    name: workflow-agents
    runtime: node
    region: oregon
    plan: starter
    rootDir: ../..
    buildCommand: npm install
    startCommand: npm run start --workspace @workshop/workflow-agents
    healthCheckPath: /healthz
    envVars:
      # Durable run records + span traces (auto-wired from the database above)
      - key: DATABASE_URL
        fromDatabase:
          name: workflow-agents-db
          property: connectionString

      # LLM provider — optional; without a key the agents use a mock model.
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false

      # Render Workflow task dispatch (production)
      - key: RENDER_API_KEY
        sync: false

      # API auth for workflow + webhook POST endpoints
      - key: WORKFLOW_API_KEY
        sync: false

      # GitHub webhook HMAC verification + token for diffs
      - key: GITHUB_WEBHOOK_SECRET
        sync: false
      - key: GITHUB_TOKEN
        sync: false

      # Run tasks in-process (set "true" only for local dev)
      - key: RENDER_USE_LOCAL_DEV
        value: "false"
      - key: NODE_ENV
        value: production
